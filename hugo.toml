baseURL = 'https://uptimer.myuptime.info/'
defaultContentLanguage = 'en'
title = 'Uptimer'

# No external theme — the B2 docs design lives in ./layouts + ./assets
# (ADR-0001 direction, ADR-0002 Pico.css classless + shared tokens.css).

# Taxonomy/term pages are unused on the docs site.
disableKinds = ['taxonomy', 'term']

[params]
# Brand icon fallback (also see /favicon.svg + /manifest.json).
BookLogo = "https://static.myuptime.info/heg43a/icon.png"

# Versioned docs. Newest first. `latest` drives the version pill, the outdated
# banner and the /latest/ redirects (#24/#25).
[params.versions]
default = "1.3.0"
available = ["1.3.0", "1.0.0"]
latest = "1.3.0"

[markup]
[markup.goldmark.renderer]
# Allow the occasional inline HTML block (status pills, cards) in content.
unsafe = true
[markup.tableOfContents]
startLevel = 2
endLevel = 3
ordered = false
[markup.highlight]
style = "github-dark"
noClasses = true
tabWidth = 2
lineNos = false
