{{ define "main" }}
<div class="shell">
  {{ partial "docs-nav.html" . }}
  <main class="content">
    {{ partial "breadcrumbs.html" . }}
    <h1>{{ .Title }}</h1>
    {{ with .Params.lede }}<p class="lede">{{ . | markdownify }}</p>{{ end }}
    {{ .Content }}
    {{ partial "pager.html" . }}
  </main>
  {{ partial "toc.html" . }}
</div>
{{ end }}
