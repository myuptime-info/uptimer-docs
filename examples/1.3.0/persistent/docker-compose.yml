# Uptimer 1.3.0 — persistent single-container dev, backed by PostgreSQL.
# `docker compose up`, then open http://localhost:2517  (dev mode: fake auth).
services:
  uptimer:
    image: ghcr.io/myuptime-info/uptimer:1.3.0
    ports:
      - "2517:2517"
    volumes:
      - ./data:/data
    environment:
      UPTIMER__SERVER__DB__DSN: "postgres://uptimer:secret@db:5432/uptimer_server?sslmode=disable"
      UPTIMER__WORKER__DB__DSN: "sqlite3:///data/worker_db.sqlite"
    command: ["--delay", "10", "dev"]   # wait for Postgres to accept connections
    depends_on:
      - db

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: uptimer_server
      POSTGRES_USER: uptimer
      POSTGRES_PASSWORD: secret
    volumes:
      - db:/var/lib/postgresql/data

volumes:
  db:
