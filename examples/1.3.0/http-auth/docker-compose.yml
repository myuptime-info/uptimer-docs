# Uptimer 1.3.0 behind nginx HTTP Basic Auth.
# `docker compose up`, then open http://localhost  (admin / password).
services:
  uptimer:
    image: ghcr.io/myuptime-info/uptimer:1.3.0
    volumes:
      - ./data:/data

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - uptimer
